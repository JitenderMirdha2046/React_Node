<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Operations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function Dashboard() {
    const [emps, setEmps] = useState([]);
    const [emp, setEmp] = useState({ no: 0, name: "", address: "" });

    var url = "http://localhost:9999/employee";

    const getData = () => {
        axios.get(url).then((result) => {
            setEmps(result.data);
        });
    };

    useEffect(() => {
        getData();
    }, []);

    const onTextChange = (args) => {
        var CpyEmp = { ...emp };
        CpyEmp[args.target.name] = args.target.value;
        setEmp(CpyEmp);
    };

    const AddRecord = () => {
        axios.post(url, emp).then((result) => {
            if (result.data.affectedRows > 0) {
                setEmp({ no: 0, name: "", address: "" });
                getData();
            } else {
                alert("Something Wrong!");
            }
        });
    };

    const edit = (e) => {
        setEmp(e);
    };

    const UpdateRecord = () => {
        axios.put(`${url}/${emp.no}`, emp).then((result) => {
            if (result.data.affectedRows > 0) {
                alert("Record Updated Successfully");
                setEmp({ no: 0, name: "", address: "" });
                getData();
            } else {
                alert("Update Failed");
            }
        });
    };

    const remove = (id) => {
        axios.delete(`${url}/${id}`).then((result) => {
            if (result.data.affectedRows > 0) {
                alert("Record Deleted");
                getData();
            } else {
                alert("Delete Failed");
            }
        });
    };

    return (
        <>
            <center>
                <h1>Crud Operations</h1>
            </center>

            <div className="container">
                <label>Name</label>
                <input
                    className="form-control"
                    type="text"
                    value={emp.name}
                    name="name"
                    onChange={onTextChange}
                />

                <hr />

                <label>Address</label>
                <input
                    className="form-control"
                    type="text"
                    value={emp.address}
                    name="address"
                    onChange={onTextChange}
                />

                <hr />

                <div>
                    <button className="btn btn-primary me-2" onClick={AddRecord}>
                        Add Record
                    </button>

                    <button className="btn btn-success" onClick={UpdateRecord}>
                        Update Record
                    </button>
                </div>

                <hr />

                <div className="table table-responsive">
                    <table className="table table-bordered text-center">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Address</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            {emps.map((e) => {
                                return (
                                    <tr key={e.no}>
                                        <td>{e.no}</td>
                                        <td>{e.name}</td>
                                        <td>{e.address}</td>

                                        <td>
                                            <button
                                                className="btn btn-warning me-2"
                                                onClick={() => edit(e)}
                                            >
                                                Edit
                                            </button>

                                            <button
                                                className="btn btn-danger"
                                                onClick={() => remove(e.no)}
                                            >
                                                Delete
                                            </button>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            </div>
        </>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</body>
</html>
