<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deployy - Code Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f0f 100%);
        }

        .header h1 {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            color: #888;
            font-weight: 300;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        .file-section {
            margin-bottom: 40px;
        }

        .file-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1e1e2e;
            border-radius: 8px 8px 0 0;
            border: 1px solid #2d2d3d;
            border-bottom: none;
        }

        .file-header .file-name {
            font-size: 14px;
            font-weight: 600;
            color: #a0a0c0;
        }

        .file-header .lang-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            background: #2d2d3d;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        pre {
            margin: 0 !important;
            border-radius: 0 0 8px 8px !important;
            border: 1px solid #2d2d3d;
            border-top: none;
        }

        pre code {
            font-size: 13px;
            line-height: 1.6;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        .copy-btn {
            background: none;
            border: 1px solid #2d2d3d;
            color: #888;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #2d2d3d;
            color: #fff;
        }

        .copy-btn.copied {
            background: #2ea043;
            color: #fff;
            border-color: #2ea043;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 48px;
            }
            .header {
                padding: 40px 20px 30px;
            }
            pre code {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>deployy</h1>
        <p>CRUD Application — Code Viewer</p>
    </div>

    <div class="container">
        <div class="file-section">
            <div class="file-header">
                <span class="file-name">frontend.html</span>
                <span class="lang-badge">HTML / JSX</span>
            </div>
            <pre><code class="language-html" id="code-frontend"></code></pre>
        </div>

        <div class="file-section">
            <div class="file-header">
                <span class="file-name">server.js</span>
                <span class="lang-badge">JavaScript</span>
            </div>
            <pre><code class="language-javascript" id="code-server"></code></pre>
        </div>
    </div>

    <div class="footer">
        Built with &#9829; &mdash; <a href="https://wbt-eta.vercel.app/" target="_blank">wbt-eta.vercel.app</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const frontendCode = `import { useState, useEffect } from "react";
import axios from "axios";

const url = "/employee";

function App() {
  const [emp, setEmp] = useState({ no: 0, name: "", address: "" });
  const [empList, setEmpList] = useState([]);

  useEffect(() => {
    loadData();
  }, []);

  const loadData = () => {
    axios.get(url).then((result) => {
      if (result.data.success) setEmpList(result.data.data);
    });
  };

  const onTextChange = (e) => {
    setEmp({ ...emp, [e.target.name]: e.target.value });
  };

  const AddRecord = () => {
    axios.post(url, emp).then((result) => {
      if (result.data.success) {
        setEmp({ no: 0, name: "", address: "" });
        loadData();
      }
    });
  };

  const UpdateRecord = () => {
    axios.put(\`\${url}/\${emp.no}\`, emp).then((result) => {
      if (result.data.success) {
        setEmp({ no: 0, name: "", address: "" });
        loadData();
      }
    });
  };

  const edit = (e) => {
    setEmp({ no: e.no, name: e.name, address: e.address });
  };

  const deleteRecord = (id) => {
    axios.delete(\`\${url}/\${id}\`).then((result) => {
      if (result.data.success) {
        alert("Record Deleted");
        loadData();
      } else {
        alert("Delete Failed");
      }
    });
  };

  return (
    <>
      <div className="container mt-4">
        <h1 className="text-center mb-4">Employee Management</h1>

        <div className="row mb-3">
          <div className="col-md-6 offset-md-3">
            <div className="mb-3">
              <label className="form-label">Name</label>
              <input
                className="form-control"
                type="text"
                value={emp.name}
                name="name"
                onChange={onTextChange}
              />
            </div>
            <div className="mb-3">
              <label className="form-label">Address</label>
              <input
                className="form-control"
                type="text"
                value={emp.address}
                name="address"
                onChange={onTextChange}
              />
            </div>
            <div className="d-flex gap-2">
              <button className="btn btn-primary" onClick={AddRecord}>
                Add Record
              </button>
              <button className="btn btn-success" onClick={UpdateRecord}>
                Update Record
              </button>
            </div>
          </div>
        </div>

        <hr />

        <div className="table-responsive">
          <table className="table table-bordered text-center">
            <thead className="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {empList.map((e) => (
                <tr key={e.no}>
                  <td>{e.no}</td>
                  <td>{e.name}</td>
                  <td>{e.address}</td>
                  <td>
                    <button
                      className="btn btn-warning btn-sm me-2"
                      onClick={() => edit(e)}
                    >
                      Edit
                    </button>
                    <button
                      className="btn btn-danger btn-sm"
                      onClick={() => deleteRecord(e.no)}
                    >
                      Delete
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

export default App;`;

        
const serverCode = `const express = require("express");
const cors = require("cors");
const mysql2 = require("mysql2");

const app = express();

app.use(cors());
app.use(express.json());

const mydb = {
    host: "localhost",
    port: "3306",
    user: "root",
    password: "root123",
    database: "iacsd"
};

const connection = mysql2.createConnection(mydb);

connection.connect((err) => {
    if (err) {
        console.log("Database connection failed", err);
        return;
    }

    console.log("Connected to MySQL");
    initializeDb();
});

function executeQuery(query,value,response){
    connection.query(query,value,(err,result)=>{
        if(err){
            return response.status(500).json({
                success:false,
                error:err.message
            });
        }
        response.json({
            success:true,
            data:result
        })
    })
}


function initializeDb(){
    connection.query(\`CREATE TABLE IF NOT EXISTS emp(
            no INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(50),
            address VARCHAR(100)
        )\`,
        (err)=>{
            if(err){
                console.log(err);
                return;
            }
            console.log("Table created or already exists");
        }

    )
}


app.get("/employee",(req,res)=>{
    executeQuery("select * from emp",[],res);
});


app.post("/employee",(req,res)=>{
    const {name,address}=req.body;
    executeQuery("Insert into emp(name,address) values (?,?)",
    [name,address],
    res
    );
});

app.put("/employee/:no",(req,res)=>{
    const {name,address}=req.body;
    executeQuery(
    "update emp set name=?,address=? where no=?",
    [name,address,req.params.no],
    res
    );
})


app.delete("/employee/:no",(req,res)=>{

    executeQuery("delete from emp where no=?",
        [req.params.no],
        res
    );
});


app.listen(5000, () => {
    console.log("Server running on port 5000");
});`;

        document.getElementById('code-frontend').textContent = frontendCode;
        document.getElementById('code-server').textContent = serverCode;
        hljs.highlightAll();
    </script>
</body>
</html>
