            { name: "exception/GlobalExceptionHandler.java", lang: "Java", code: `package com.jobportal.exception;

import org.springframework.http.HttpStatus;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.ExceptionHandler;
import org.springframework.web.bind.annotation.RestControllerAdvice;
import java.time.LocalDateTime;

@RestControllerAdvice
public class GlobalExceptionHandler {

    @ExceptionHandler(ResourceNotFoundException.class)
    public ResponseEntity<ErrorResponse> handleNotFound(ResourceNotFoundException ex) {
        ErrorResponse response = new ErrorResponse(
                LocalDateTime.now(), 404, "NOT_FOUND", ex.getMessage());
        return new ResponseEntity<>(response, HttpStatus.NOT_FOUND);
    }

    @ExceptionHandler(Exception.class)
    public ResponseEntity<ErrorResponse> handleException(Exception ex) {
        ErrorResponse response = new ErrorResponse(
                LocalDateTime.now(), 500, "INTERNAL_SERVER_ERROR", ex.getMessage());
        return new ResponseEntity<>(response, HttpStatus.INTERNAL_SERVER_ERROR);
    }
}` },

            { name: "service/JobServiceImpl.java", lang: "Java", code: `package com.jobportal.service;

import com.jobportal.entity.Company;
import com.jobportal.entity.Job;
import com.jobportal.enums.IndustryType;
import com.jobportal.enums.JobStatus;
import com.jobportal.enums.JobType;
import com.jobportal.exception.ResourceNotFoundException;
import com.jobportal.repository.CompanyRepository;
import com.jobportal.repository.JobRepository;
import com.jobportal.dto.JobRequestDto;
import com.jobportal.dto.SalaryUpdateDto;
import com.jobportal.dto.JobStatusDto;
import org.springframework.beans.factory.annotation.Autowired;
import org.springframework.stereotype.Service;
import java.time.LocalDate;
import java.util.List;

@Service
public class JobServiceImpl implements JobService {

    @Autowired
    private JobRepository jobRepo;

    @Autowired
    private CompanyRepository companyRepo;

    @Override
    public Job createJob(JobRequestDto dto) {
        Company company = companyRepo.findById(dto.getCompanyId())
                .orElseThrow(() -> new ResourceNotFoundException("Company Not Found"));

        Job job = new Job();
        job.setTitle(dto.getTitle());
        job.setDescription(dto.getDescription());
        job.setSalary(dto.getSalary());
        job.setLocation(dto.getLocation());
        job.setJobType(dto.getJobType());
        job.setPostedDate(LocalDate.now());
        job.setStatus(JobStatus.AVAILABLE);
        job.setCompany(company);

        return jobRepo.save(job);
    }

    @Override
    public List<Job> getJobsByLocation(String location) {
        return jobRepo.findByLocation(location);
    }

    @Override
    public void deleteJobs(String companyName, JobType jobType) {
        jobRepo.deleteByCompanyNameAndJobType(companyName, jobType);
    }

    @Override
    public Job updateSalary(SalaryUpdateDto dto) {
        Job job = jobRepo.findByCompanyIdAndTitle(dto.getCompanyId(), dto.getJobTitle())
                .orElseThrow(() -> new ResourceNotFoundException("Job Not Found"));

        job.setSalary(dto.getSalary());
        return jobRepo.save(job);
    }

    @Override
    public List<Job> getJobsByIndustrySalary(IndustryType industry, Double salary) {
        return jobRepo.findByCompanyIndustryAndSalaryGreaterThanEqual(industry, salary);
    }

    @Override
    public Job updateJobStatus(JobStatusDto dto) {
        Job job = jobRepo.findByCompanyNameAndTitle(dto.getCompanyName(), dto.getJobTitle())
                .orElseThrow(() -> new ResourceNotFoundException("Job Not Found"));

        job.setStatus(JobStatus.UNAVAILABLE);
        return jobRepo.save(job);
    }
}` },

import com.jobportal.entity.Job;
import com.jobportal.enums.IndustryType;
import com.jobportal.enums.JobType;
import com.jobportal.service.JobService;
import com.jobportal.dto.JobRequestDto;
import com.jobportal.dto.SalaryUpdateDto;
import com.jobportal.dto.JobStatusDto;
import org.springframework.beans.factory.annotation.Autowired;
import org.springframework.http.HttpStatus;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.*;
import java.util.List;

@RestController
@RequestMapping("/api/jobs")
public class JobController {

    @Autowired
    private JobService service;

    @PostMapping
    public ResponseEntity<Job> createJob(@RequestBody JobRequestDto dto) {
        return new ResponseEntity<>(service.createJob(dto), HttpStatus.CREATED);
    }

    @GetMapping("/location/{location}")
    public ResponseEntity<List<Job>> getJobsByLocation(@PathVariable String location) {
        return ResponseEntity.ok(service.getJobsByLocation(location));
    }

    @DeleteMapping
    public ResponseEntity<String> deleteJobs(
            @RequestParam String companyName,
            @RequestParam JobType jobType) {

        service.deleteJobs(companyName, jobType);
        return ResponseEntity.ok("Deleted Successfully");
    }

    @PutMapping("/salary")
    public ResponseEntity<Job> updateSalary(@RequestBody SalaryUpdateDto dto) {
        return ResponseEntity.ok(service.updateSalary(dto));
    }

    @GetMapping("/industry")
    public ResponseEntity<List<Job>> getJobs(
            @RequestParam IndustryType industry,
            @RequestParam Double salary) {

        return ResponseEntity.ok(service.getJobsByIndustrySalary(industry, salary));
    }

    @PutMapping("/status")
    public ResponseEntity<Job> updateStatus(@RequestBody JobStatusDto dto) {
        return ResponseEntity.ok(service.updateJobStatus(dto));
    }
}` },

                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            };

            header.appendChild(nameSpan);
            header.appendChild(badge);
            header.appendChild(copyBtn);

            const pre = document.createElement('pre');
            const code = document.createElement('code');
            code.className = f.lang === 'XML' ? 'language-xml' : f.lang === 'SQL' ? 'language-sql' : f.lang === 'Properties' ? 'language-ini' : 'language-java';
            code.textContent = f.code;

            pre.appendChild(code);
            section.appendChild(header);
            section.appendChild(pre);
            container.appendChild(section);
        });

        hljs.highlightAll();
    </script>
</body>
</html>
